    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const PROMPT = "make my input field stop firing on every keystroke";

        const inputTextEl = document.querySelector(
          '[data-composition-id="code-agent-main"] #ca-input-text',
        );
        const userTextEl = document.querySelector(
          '[data-composition-id="code-agent-main"] #ca-user-text',
        );
        const caret = document.querySelector(
          '[data-composition-id="code-agent-main"] #ca-input-caret',
        );
        const termBody = document.querySelector(
          '[data-composition-id="code-agent-main"] #ca-term-body',
        );

        // Hide the user bubble until the prompt is committed.
        tl.set('[data-composition-id="code-agent-main"] .ca-msg-user', { opacity: 0, y: 8 }, 0);
        tl.set(userTextEl, { text: "" }, 0);
        tl.set(inputTextEl, { text: "" }, 0);

        // Window enters.
        tl.to(
          '[data-composition-id="code-agent-main"] .ca-window',
          { opacity: 1, y: 0, scale: 1, duration: 0.6, ease: "power3.out" },
          0.1,
        );

        // Sidebar items stagger in.
        tl.to(
          '[data-composition-id="code-agent-main"] .ca-chat',
          { opacity: 1, x: 0, duration: 0.35, stagger: 0.06, ease: "power2.out" },
          0.55,
        );

        // Input caret blinks: 1s cycle from t=1.0 to t=11.8 → 10 full cycles → repeat: 9.
        const caretBlink = gsap.timeline({ repeat: 9, paused: true });
        caretBlink.to(caret, { opacity: 1, duration: 0.001 });
        caretBlink.to(caret, { opacity: 0, duration: 0.001 }, 0.5);
        tl.call(() => caretBlink.play(0), null, 1.0);
        tl.set(caret, { opacity: 1 }, 1.0);

        // Type the prompt char-by-char into the input bar.
        const promptStart = 1.1;
        const promptEnd = 3.3;
        const typeProxy = { i: 0 };
        tl.to(
          typeProxy,
          {
            i: PROMPT.length,
            duration: promptEnd - promptStart,
            ease: "none",
            onUpdate: () => {
              if (!inputTextEl) return;
              inputTextEl.textContent = PROMPT.slice(0, Math.round(typeProxy.i));
            },
          },
          promptStart,
        );

        // Pulse the send button as it commits.
        tl.to(
          '[data-composition-id="code-agent-main"] #ca-send',
          { backgroundColor: "#1f6feb", color: "#ffffff", duration: 0.18, ease: "power2.out" },
          promptEnd,
        );
        tl.to(
          '[data-composition-id="code-agent-main"] #ca-send',
          { scale: 0.92, duration: 0.1, ease: "power2.in", yoyo: true, repeat: 1 },
          promptEnd,
        );

        // Move the typed prompt up into a user bubble; clear the input.
        tl.call(
          () => {
            if (userTextEl) userTextEl.textContent = PROMPT;
            if (inputTextEl) inputTextEl.textContent = "";
          },
          null,
          promptEnd + 0.05,
        );
        tl.fromTo(
          '[data-composition-id="code-agent-main"] .ca-msg-user',
          { opacity: 0, y: 30, scale: 0.96 },
          { opacity: 1, y: 0, scale: 1, duration: 0.4, ease: "back.out(1.5)" },
          promptEnd + 0.05,
        );

        // Assistant placeholder appears + thinking dots.
        tl.to(
          '[data-composition-id="code-agent-main"] .ca-msg-asst',
          { opacity: 1, y: 0, duration: 0.3, ease: "power2.out" },
          promptEnd + 0.4,
        );
        tl.to(
          '[data-composition-id="code-agent-main"] .ca-thinking',
          { opacity: 1, duration: 0.2, ease: "power2.out" },
          promptEnd + 0.4,
        );

        tl.to(
          '[data-composition-id="code-agent-main"] .ca-thinking span',
          { y: -4, duration: 0.3, stagger: 0.12, yoyo: true, repeat: 1 },
          promptEnd + 0.5,
        );
        tl.to(
          '[data-composition-id="code-agent-main"] .ca-thinking span',
          { y: -4, duration: 0.3, stagger: 0.12, yoyo: true, repeat: 1 },
          promptEnd + 1.1,
        );

        // Thinking out, reply in.
        const replyStart = promptEnd + 1.7;
        tl.to(
          '[data-composition-id="code-agent-main"] .ca-thinking',
          { opacity: 0, duration: 0.2, ease: "power2.in" },
          replyStart - 0.1,
        );
        tl.set(
          '[data-composition-id="code-agent-main"] .ca-thinking',
          { display: "none" },
          replyStart,
        );
        tl.to(
          '[data-composition-id="code-agent-main"] .ca-asst-reply',
          { opacity: 1, duration: 0.3, ease: "power2.out" },
          replyStart,
        );

        // Stream code lines in.
        const codeStart = replyStart + 0.25;
        tl.to(
          '[data-composition-id="code-agent-main"] .ca-line',
          {
            opacity: 1,
            x: 0,
            duration: 0.18,
            stagger: 0.16,
            ease: "power2.out",
          },
          codeStart,
        );

        // After code is laid out, highlight + click Run.
        const runAt = codeStart + 0.18 + 0.16 * 9 + 0.2;
        tl.to(
          '[data-composition-id="code-agent-main"] #ca-runbtn',
          { backgroundColor: "#238636", borderColor: "#2ea043", color: "#ffffff", duration: 0.25 },
          runAt,
        );
        tl.to(
          '[data-composition-id="code-agent-main"] #ca-runbtn',
          { scale: 0.94, duration: 0.1, ease: "power2.in", yoyo: true, repeat: 1 },
          runAt + 0.1,
        );

        // Terminal panel reveals.
        const termAt = runAt + 0.45;
        tl.to(
          '[data-composition-id="code-agent-main"] .ca-terminal',
          { opacity: 1, y: 0, duration: 0.4, ease: "power3.out" },
          termAt,
        );

        // Stream terminal output line by line via direct text writes.
        const termLines = [
          "$ bun test debounce.ts",
          "  bun test v1.1",
          "",
          "  debounce.ts:",
          "    ✓ fires once after rapid calls (12ms)",
          "    ✓ passes latest args (4ms)",
          "",
          "  2 pass / 0 fail   — ready.",
        ];
        let termAcc = "";
        termLines.forEach((line, i) => {
          tl.call(
            () => {
              if (!termBody) return;
              termAcc = termAcc.length === 0 ? line : termAcc + "\n" + line;
              termBody.textContent = termAcc;
            },
            null,
            termAt + 0.2 + i * 0.18,
          );
        });

        // Stop the caret blink at the end.
        tl.call(
          () => {
            caretBlink.pause();
            if (caret) caret.style.opacity = "0";
          },
          null,
          11.8,
        );

        window.__timelines = window.__timelines || {};
        window.__timelines["code-agent-main"] = tl;
      })();
    </script>
  </div>
</template>
