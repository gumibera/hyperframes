pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{js,jsx,ts,tsx}"
      run: bunx oxlint {staged_files}
    format:
      glob: "*.{js,jsx,ts,tsx,json,md,yaml,yml}"
      # --no-error-on-unmatched-pattern: don't fail when staged files all
      # fall under .prettierignore (e.g. docs-only changes to docs/docs.json).
      run: bunx oxfmt --check --no-error-on-unmatched-pattern {staged_files}
    typecheck:
      glob: "*.{ts,tsx}"
      run: cd packages/core && bunx tsc --noEmit && cd ../studio && bunx tsc --noEmit
    codex-plugin-sync:
      # Rebuild the Codex plugin's skills/ copy whenever a source skill changes.
      # Auto-stages the rebuilt output so the committed plugin never drifts.
      glob: "skills/**/*"
      run: bun run build:codex-plugin && git add packages/codex-plugin/skills

commit-msg:
  commands:
    commitlint:
      run: bunx commitlint --edit "{1}"
