<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Opacity Mixed Fade — HDR + SDR</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.13/dist/gsap.min.js"></script>
    <script type="module" src="./vendor/shader-transitions.js"></script>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="6"
      data-width="1920"
      data-height="1080"
    >
      <section class="scene" id="scene-1" data-start="0" data-duration="6">
        <div class="hud-slate" data-start="0" data-duration="6">
          <div class="hud-tag">Entry fade-in (t=1–1.7, 0→1) · then opacity yoyo (t=2–5, 1↔0.15)</div>
          <div class="hud-line">left=HDR (BT.2020 PQ) · right=SDR (BT.709) · both run identical tween</div>
        </div>

        <div class="frame frame-left" id="frame-hdr" data-start="0" data-duration="6">
          <video
            id="vid-hdr"
            class="clip"
            src="../assets/hdr.mp4"
            data-start="0"
            data-duration="6"
            data-track-index="0"
            muted
            playsinline
          ></video>
          <div class="frame-tag">HDR</div>
        </div>

        <div class="frame frame-right" id="frame-sdr" data-start="0" data-duration="6">
          <video
            id="vid-sdr"
            class="clip"
            src="../assets/sdr.mp4"
            data-start="0"
            data-duration="6"
            data-track-index="1"
            muted
            playsinline
          ></video>
          <div class="frame-tag">SDR</div>
        </div>
      </section>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
