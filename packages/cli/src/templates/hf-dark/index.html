<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>HyperFrames Dark</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=block"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0f;
        font-family: "Inter", -apple-system, sans-serif;
        color: #ffffff;
      }

      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #0a0a0f;
      }

      /* ── Subtle background grid ── */
      #bg-grid {
        position: absolute;
        inset: 0;
        z-index: 1;
        background-image:
          linear-gradient(rgba(60, 230, 172, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(60, 230, 172, 0.03) 1px, transparent 1px);
        background-size: 80px 80px;
        opacity: 0;
      }

      /* Ambient glow orbs */
      #glow-1 {
        position: absolute;
        width: 600px;
        height: 600px;
        top: -100px;
        right: -100px;
        z-index: 2;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(60, 230, 172, 0.08) 0%, transparent 70%);
        filter: blur(80px);
        opacity: 0;
      }
      #glow-2 {
        position: absolute;
        width: 500px;
        height: 500px;
        bottom: -50px;
        left: -50px;
        z-index: 2;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(60, 230, 172, 0.06) 0%, transparent 70%);
        filter: blur(60px);
        opacity: 0;
      }

      /* ══════════════════════════════════
         SCENE 1 — LOGO REVEAL (0-3s)
         ══════════════════════════════════ */
      #scene-logo {
        position: absolute;
        inset: 0;
        z-index: 10;
      }
      #scene-logo-inner {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 40px;
      }

      #logo-icon {
        width: 200px;
        height: 200px;
        opacity: 0;
        filter: blur(20px);
      }

      #logo-text {
        font-size: 72px;
        font-weight: 800;
        letter-spacing: 0.3em;
        color: #ffffff;
        opacity: 0;
      }

      #logo-accent {
        width: 0;
        height: 3px;
        background: linear-gradient(to right, transparent, #3CE6AC, transparent);
        box-shadow: 0 0 20px rgba(60, 230, 172, 0.4);
      }

      /* ══════════════════════════════════
         SCENE 2 — FEATURES (3-7s)
         ══════════════════════════════════ */
      #scene-features {
        position: absolute;
        inset: 0;
        z-index: 20;
      }
      #scene-features-inner {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 60px;
        padding: 0 120px;
      }

      .feature-card {
        flex: 1;
        max-width: 480px;
        padding: 56px 48px;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.04) 0%, rgba(255, 255, 255, 0.01) 100%);
        border: 1px solid rgba(60, 230, 172, 0.15);
        border-radius: 24px;
        opacity: 0;
        transform: translateY(80px);
        backdrop-filter: blur(10px);
      }
      .feature-card:hover {
        border-color: rgba(60, 230, 172, 0.3);
      }

      .fc-icon {
        font-size: 48px;
        margin-bottom: 24px;
        line-height: 1;
      }

      .fc-title {
        font-size: 28px;
        font-weight: 700;
        color: #ffffff;
        margin-bottom: 16px;
        line-height: 1.2;
      }

      .fc-desc {
        font-size: 18px;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.55);
        line-height: 1.6;
      }

      .fc-accent {
        width: 0;
        height: 2px;
        background: #3CE6AC;
        margin-top: 24px;
        border-radius: 1px;
      }

      /* ══════════════════════════════════
         SCENE 3 — CTA (7-10s)
         ══════════════════════════════════ */
      #scene-cta {
        position: absolute;
        inset: 0;
        z-index: 30;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 32px;
      }

      #cta-terminal {
        padding: 28px 56px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(60, 230, 172, 0.25);
        border-radius: 16px;
        font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
        font-size: 32px;
        color: #3CE6AC;
        opacity: 0;
        display: flex;
        align-items: center;
        gap: 4px;
      }

      #cta-prompt {
        color: rgba(255, 255, 255, 0.4);
      }

      #cta-command {
        color: #3CE6AC;
      }

      #cta-cursor {
        display: inline-block;
        width: 3px;
        height: 36px;
        background: #3CE6AC;
        margin-left: 4px;
        vertical-align: middle;
      }

      #cta-url {
        font-size: 22px;
        font-weight: 500;
        color: rgba(255, 255, 255, 0.4);
        letter-spacing: 0.15em;
        opacity: 0;
      }

      #cta-tagline {
        font-size: 18px;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.3);
        letter-spacing: 0.08em;
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="10"
      data-width="1920"
      data-height="1080"
    >
      <!-- Background elements -->
      <div id="bg-grid"></div>
      <div id="glow-1"></div>
      <div id="glow-2"></div>

      <!-- SCENE 1: Logo Reveal (0-3s) -->
      <div
        id="scene-logo"
        class="clip"
        data-start="0"
        data-duration="3"
        data-track-index="1"
      >
        <div id="scene-logo-inner">
        <img id="logo-icon" src="favicon.svg" alt="HyperFrames" />
        <div id="logo-accent"></div>
        <div id="logo-text">HYPERFRAMES</div>
        </div>
      </div>

      <!-- SCENE 2: Feature Cards (3-7s) -->
      <div
        id="scene-features"
        class="clip"
        data-start="3"
        data-duration="4"
        data-track-index="1"
      >
        <div id="scene-features-inner">
        <div class="feature-card" id="fc-1">
          <div class="fc-icon">&lt;/&gt;</div>
          <div class="fc-title">Write HTML</div>
          <div class="fc-desc">Compose videos with standard web technologies</div>
          <div class="fc-accent" id="fca-1"></div>
        </div>
        <div class="feature-card" id="fc-2">
          <div class="fc-icon">&#9654;</div>
          <div class="fc-title">Preview Live</div>
          <div class="fc-desc">See changes instantly in the Studio editor</div>
          <div class="fc-accent" id="fca-2"></div>
        </div>
        <div class="feature-card" id="fc-3">
          <div class="fc-icon">&#9881;</div>
          <div class="fc-title">Render to MP4</div>
          <div class="fc-desc">Export production-quality video in seconds</div>
          <div class="fc-accent" id="fca-3"></div>
        </div>
        </div>
      </div>

      <!-- SCENE 3: CTA (7-10s) -->
      <div
        id="scene-cta"
        class="clip"
        data-start="7"
        data-duration="3"
        data-track-index="1"
      >
        <div id="cta-terminal">
          <span id="cta-prompt">$&nbsp;</span>
          <span id="cta-command">npx hyperframes init</span>
          <span id="cta-cursor"></span>
        </div>
        <div id="cta-url">hyperframes.heygen.com</div>
        <div id="cta-tagline">Write HTML. Render Video.</div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      /* ─── BACKGROUND ─── */
      tl.to("#bg-grid", { opacity: 1, duration: 1.5, ease: "power2.out" }, 0);
      tl.to("#glow-1", { opacity: 1, duration: 2, ease: "power2.out" }, 0.2);
      tl.to("#glow-2", { opacity: 1, duration: 2, ease: "power2.out" }, 0.5);

      // Slow drift on glows
      tl.to("#glow-1", { x: -40, y: 30, duration: 10, ease: "none" }, 0);
      tl.to("#glow-2", { x: 30, y: -20, duration: 10, ease: "none" }, 0);

      /* ─── SCENE 1: LOGO REVEAL (0-3s) ─── */
      tl.fromTo("#logo-icon", { scale: 0.5 }, {
        opacity: 1,
        scale: 1,
        filter: "blur(0px)",
        duration: 1.2,
        ease: "power3.out",
      }, 0.2);

      tl.to("#logo-accent", {
        width: 200,
        duration: 0.6,
        ease: "power3.out",
      }, 1.0);

      tl.fromTo("#logo-text", { y: 20 }, {
        opacity: 1,
        y: 0,
        duration: 0.8,
        ease: "power3.out",
      }, 1.2);

      // Fade logo out before features
      tl.to("#scene-logo-inner", {
        opacity: 0,
        duration: 0.5,
        ease: "power2.in",
      }, 2.5);

      /* ─── SCENE 2: FEATURE CARDS (3-7s) ─── */
      tl.to("#fc-1", {
        opacity: 1,
        y: 0,
        duration: 0.7,
        ease: "back.out(1.4)",
      }, 3.0);

      tl.to("#fc-2", {
        opacity: 1,
        y: 0,
        duration: 0.7,
        ease: "back.out(1.4)",
      }, 3.2);

      tl.to("#fc-3", {
        opacity: 1,
        y: 0,
        duration: 0.7,
        ease: "back.out(1.4)",
      }, 3.4);

      // Accent lines animate in
      tl.to("#fca-1", { width: "100%", duration: 0.5, ease: "power3.out" }, 3.6);
      tl.to("#fca-2", { width: "100%", duration: 0.5, ease: "power3.out" }, 3.8);
      tl.to("#fca-3", { width: "100%", duration: 0.5, ease: "power3.out" }, 4.0);

      // Cards subtle hover glow
      tl.to(".feature-card", {
        boxShadow: "0 0 40px rgba(60, 230, 172, 0.06), 0 8px 32px rgba(0, 0, 0, 0.3)",
        duration: 1.5,
        ease: "sine.inOut",
        stagger: 0.15,
      }, 4.2);

      // Fade features out before CTA
      tl.to("#scene-features-inner", {
        opacity: 0,
        duration: 0.5,
        ease: "power2.in",
      }, 6.5);

      /* ─── SCENE 3: CTA (7-10s) ─── */
      tl.fromTo("#cta-terminal", { scale: 0.9 }, {
        opacity: 1,
        scale: 1,
        duration: 0.6,
        ease: "back.out(1.7)",
      }, 7.2);

      // Cursor blink
      tl.to("#cta-cursor", {
        opacity: 0,
        duration: 0.01,
        ease: "none",
        repeat: -1,
        yoyo: true,
        repeatDelay: 0.5,
      }, 7.4);

      tl.fromTo("#cta-url", { y: 10 }, {
        opacity: 1,
        y: 0,
        duration: 0.5,
        ease: "power3.out",
      }, 7.8);

      tl.to("#cta-tagline", {
        opacity: 1,
        duration: 0.5,
        ease: "power3.out",
      }, 8.2);

      // Gentle terminal glow pulse
      tl.to("#cta-terminal", {
        boxShadow: "0 0 60px rgba(60, 230, 172, 0.1), inset 0 0 30px rgba(60, 230, 172, 0.02)",
        duration: 1.5,
        ease: "sine.inOut",
        repeat: -1,
        yoyo: true,
      }, 8.0);

      // Pin to 10s
      tl.set({}, {}, 10);
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
