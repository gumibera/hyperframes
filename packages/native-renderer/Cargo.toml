[package]
name = "hyperframes-native-renderer"
version = "0.1.0"
edition = "2021"

[features]
default = ["metal-gpu"]
metal-gpu = ["skia-safe/gpu", "skia-safe/metal", "dep:metal", "dep:objc2", "dep:objc2-foundation"]
vulkan-gpu = ["skia-safe/gpu", "skia-safe/vulkan"]

[dependencies]
base64 = "0.22"
skia-safe = { version = "0.93", features = ["textlayout"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
openh264 = "0.6"
dcv-color-primitives = "0.7"
minimp4 = "0.1"
metal = { version = "0.31", optional = true }
objc2 = { version = "0.6", optional = true }
objc2-foundation = { version = "0.3", features = ["NSObject"], optional = true }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
insta = "1"

[[bench]]
name = "render_bench"
harness = false
