[package]
name = "hyperframes-native-renderer"
version = "0.1.0"
edition = "2021"

[dependencies]
skia-safe = { version = "0.93", features = ["textlayout", "gpu", "metal"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[target.'cfg(target_os = "macos")'.dependencies]
metal = "0.31"
objc2 = "0.6"
objc2-foundation = { version = "0.3", features = ["NSObject"] }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
insta = "1"

[[bench]]
name = "render_bench"
harness = false
