[package]
name = "hyperframes-native-renderer"
version = "0.1.0"
edition = "2021"

[dependencies]
skia-safe = { version = "0.93", features = ["textlayout"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
insta = "1"

[[bench]]
name = "render_bench"
harness = false
