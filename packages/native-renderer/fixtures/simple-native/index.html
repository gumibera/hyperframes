<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Native Renderer Proof</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #05070d;
        overflow: hidden;
        font-family: Inter, Arial, sans-serif;
      }

      #main-comp {
        position: relative;
        width: 640px;
        height: 360px;
        overflow: hidden;
        background: rgb(5, 7, 13);
      }

      #panel {
        position: absolute;
        left: 64px;
        top: 72px;
        width: 512px;
        height: 216px;
        overflow: hidden;
        background: rgb(24, 36, 54);
      }

      #accent {
        position: absolute;
        left: 0;
        top: 0;
        width: 14px;
        height: 216px;
        background: rgb(255, 214, 0);
      }

      #block-a,
      #block-b,
      #block-c {
        position: absolute;
        opacity: 0;
      }

      #block-a {
        left: 48px;
        top: 44px;
        width: 336px;
        height: 34px;
        background: rgb(245, 249, 255);
        opacity: 0;
      }

      #block-b {
        left: 48px;
        top: 108px;
        width: 264px;
        height: 24px;
        background: rgb(180, 205, 236);
        opacity: 0;
      }

      #block-c {
        left: 48px;
        top: 164px;
        width: 168px;
        height: 38px;
        background: rgb(255, 214, 0);
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <main
      id="main-comp"
      data-composition-id="native-proof"
      data-width="640"
      data-height="360"
      data-duration="1"
    >
      <section id="panel">
        <div id="accent"></div>
        <div id="block-a"></div>
        <div id="block-b"></div>
        <div id="block-c"></div>
      </section>
    </main>

    <script>
      const duration = 1;
      const animated = [
        { id: "block-a", delay: 0 },
        { id: "block-b", delay: 0.18 },
        { id: "block-c", delay: 0.36 },
      ];

      function clamp01(v) {
        return Math.max(0, Math.min(1, v));
      }

      function easeOutCubic(v) {
        return 1 - Math.pow(1 - v, 3);
      }

      function seek(t) {
        for (const item of animated) {
          const el = document.getElementById(item.id);
          const p = easeOutCubic(clamp01((t - item.delay) / 0.42));
          el.style.opacity = String(p);
        }
      }

      window.__hf = { duration, seek };
      seek(0);
    </script>
  </body>
</html>
