<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; }
    body { width: 1280px; height: 720px; background: #1a1a2e; }
    .title {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: -apple-system, system-ui, sans-serif;
      font-size: 48px;
      font-weight: 700;
      color: white;
      text-align: center;
    }
    .title span {
      display: block;
      font-size: 28px;
      color: #4ecdc4;
      margin-top: 8px;
    }
    .box {
      position: absolute;
      width: 120px; height: 120px;
      border-radius: 16px;
    }
    .box-1 { background: #e94560; top: 200px; left: 200px; }
    .box-2 { background: #4ecdc4; top: 200px; right: 200px; }
    .box-3 { background: #ffe66d; bottom: 150px; left: 50%; transform: translateX(-50%); }
    .subtitle {
      position: absolute;
      bottom: 40px; left: 50%;
      transform: translateX(-50%);
      font-family: monospace;
      font-size: 18px;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="box box-1" id="box1"></div>
  <div class="box box-2" id="box2"></div>
  <div class="box box-3" id="box3"></div>
  <div class="title" id="title">HyperFrames<span>Client-Side Renderer</span></div>
  <div class="subtitle" id="subtitle">WebCodecs + MediaBunny + SnapDOM</div>

  <script>
    // Simple CSS-driven animation state (no external deps)
    var duration = 3;
    var elements = {
      box1: document.getElementById('box1'),
      box2: document.getElementById('box2'),
      box3: document.getElementById('box3'),
      title: document.getElementById('title'),
      subtitle: document.getElementById('subtitle'),
    };

    function lerp(a, b, t) { return a + (b - a) * Math.min(1, Math.max(0, t)); }
    function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

    function seekTo(time) {
      var t = time / duration;

      // Box 1: slide in from left (0-0.8s)
      var b1t = easeOut(Math.min(1, time / 0.8));
      elements.box1.style.transform = 'translateX(' + lerp(-600, 0, b1t) + 'px) rotate(' + lerp(-180, 0, b1t) + 'deg)';

      // Box 2: slide in from right (0.1-0.9s)
      var b2t = easeOut(Math.min(1, Math.max(0, (time - 0.1) / 0.8)));
      elements.box2.style.transform = 'translateX(' + lerp(600, 0, b2t) + 'px) rotate(' + lerp(180, 0, b2t) + 'deg)';

      // Box 3: slide up from bottom (0.2-1.0s)
      var b3t = easeOut(Math.min(1, Math.max(0, (time - 0.2) / 0.8)));
      elements.box3.style.transform = 'translateX(-50%) translateY(' + lerp(400, 0, b3t) + 'px)';

      // Title: fade in (1.0-1.5s)
      var tt = Math.min(1, Math.max(0, (time - 1.0) / 0.5));
      elements.title.style.opacity = tt;

      // Subtitle: fade in (1.5-2.0s)
      var st = Math.min(1, Math.max(0, (time - 1.5) / 0.5));
      elements.subtitle.style.opacity = st;
    }

    // Initialize at time 0
    seekTo(0);

    // HyperFrames seek protocol
    window.__hf = {
      duration: duration,
      seek: seekTo,
      media: [],
    };
  </script>
</body>
</html>
