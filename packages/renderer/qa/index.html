<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>HyperFrames Renderer QA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, system-ui, sans-serif;
      background: #0f0f23;
      color: #e0e0e0;
      padding: 2rem;
      min-height: 100vh;
    }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; color: #fff; }
    .status {
      background: #1a1a3e;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
      font-family: monospace;
      font-size: 0.9rem;
      min-height: 120px;
      white-space: pre-wrap;
    }
    .controls { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
    button {
      background: #e94560;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #d63850; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .progress-bar {
      width: 100%;
      height: 8px;
      background: #1a1a3e;
      border-radius: 4px;
      margin-bottom: 1rem;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #4ecdc4;
      width: 0%;
      transition: width 0.2s;
      border-radius: 4px;
    }
    .result {
      display: none;
      background: #1a2e1a;
      border: 1px solid #4ecdc4;
      border-radius: 8px;
      padding: 1rem;
      margin-top: 1rem;
    }
    .result.visible { display: block; }
    video { max-width: 100%; border-radius: 8px; margin-top: 1rem; }
    .check { color: #4ecdc4; }
    .error { color: #e94560; }
    .perf-table { margin-top: 0.5rem; }
    .perf-table td { padding: 0.25rem 1rem 0.25rem 0; }
    .perf-table td:last-child { color: #4ecdc4; font-family: monospace; }
  </style>
</head>
<body>
  <h1>@hyperframes/renderer — QA Test</h1>

  <div id="compat-status" class="status">Checking browser compatibility...</div>

  <div class="controls">
    <button id="render-btn" disabled>Render Composition to MP4</button>
    <button id="download-btn" disabled>Download MP4</button>
  </div>

  <div class="progress-bar">
    <div id="progress-fill" class="progress-fill"></div>
  </div>

  <div id="log" class="status"></div>

  <div id="result" class="result">
    <h3 class="check">Render Complete</h3>
    <table class="perf-table">
      <tr><td>Total time:</td><td id="perf-total"></td></tr>
      <tr><td>Capture:</td><td id="perf-capture"></td></tr>
      <tr><td>Encode:</td><td id="perf-encode"></td></tr>
      <tr><td>Audio:</td><td id="perf-audio"></td></tr>
      <tr><td>Mux:</td><td id="perf-mux"></td></tr>
      <tr><td>FPS:</td><td id="perf-fps"></td></tr>
      <tr><td>File size:</td><td id="perf-size"></td></tr>
    </table>
    <video id="output-video" controls></video>
  </div>

  <script type="module">
    const log = document.getElementById('log');
    const compatStatus = document.getElementById('compat-status');
    const renderBtn = document.getElementById('render-btn');
    const downloadBtn = document.getElementById('download-btn');
    const progressFill = document.getElementById('progress-fill');
    const resultDiv = document.getElementById('result');
    let resultBlob = null;

    function addLog(msg) {
      log.textContent += msg + '\n';
      log.scrollTop = log.scrollHeight;
    }

    // Check compatibility
    const hasVideoEncoder = typeof VideoEncoder !== 'undefined';
    const hasOffscreenCanvas = typeof OffscreenCanvas !== 'undefined';
    const hasAudioContext = typeof AudioContext !== 'undefined';
    const hasCreateImageBitmap = typeof createImageBitmap !== 'undefined';

    let compatHtml = '';
    compatHtml += `VideoEncoder:     ${hasVideoEncoder ? '✅' : '❌'}\n`;
    compatHtml += `OffscreenCanvas:  ${hasOffscreenCanvas ? '✅' : '❌'}\n`;
    compatHtml += `AudioContext:     ${hasAudioContext ? '✅' : '❌'}\n`;
    compatHtml += `createImageBitmap:${hasCreateImageBitmap ? '✅' : '❌'}\n`;

    const isSupported = hasVideoEncoder && hasOffscreenCanvas && hasAudioContext && hasCreateImageBitmap;
    compatHtml += `\nOverall: ${isSupported ? '✅ All APIs available — ready to render' : '❌ Missing required APIs'}`;
    compatStatus.textContent = compatHtml;

    if (isSupported) {
      renderBtn.disabled = false;
    }

    renderBtn.addEventListener('click', async () => {
      renderBtn.disabled = true;
      resultDiv.classList.remove('visible');
      log.textContent = '';
      progressFill.style.width = '0%';

      addLog('Starting render...');
      addLog(`Composition: /qa/composition.html`);
      addLog(`Settings: 1280x720 @ 30fps, H.264, MP4`);
      addLog('');

      try {
        // Dynamic import of the bundled renderer
        const { render } = await import('../dist/renderer.bundle.js');

        const result = await render({
          composition: new URL('/qa/composition.html', window.location.origin).href,
          workerUrl: new URL('/dist/worker.bundle.js', window.location.origin).href,
          fps: 30,
          width: 1280,
          height: 720,
          codec: 'h264',
          format: 'mp4',
          concurrency: 2,
          onProgress: (p) => {
            const pct = Math.round(p.progress * 100);
            progressFill.style.width = `${pct}%`;
            addLog(`[${p.stage}] ${pct}% ${p.currentFrame ? `frame ${p.currentFrame}/${p.totalFrames}` : ''} ${p.captureRate ? `(${p.captureRate.toFixed(1)} fps)` : ''}`);
          },
        });

        resultBlob = result.blob;
        addLog('');
        addLog(`✅ Render complete!`);
        addLog(`   Blob size: ${(result.blob.size / 1024).toFixed(1)} KB`);
        addLog(`   MIME: ${result.mimeType}`);
        addLog(`   Render time: ${(result.durationMs / 1000).toFixed(2)}s`);

        // Show result
        document.getElementById('perf-total').textContent = `${(result.perf.totalMs / 1000).toFixed(2)}s`;
        document.getElementById('perf-capture').textContent = `${(result.perf.captureMs / 1000).toFixed(2)}s`;
        document.getElementById('perf-encode').textContent = `${(result.perf.encodeMs / 1000).toFixed(2)}s`;
        document.getElementById('perf-audio').textContent = `${(result.perf.audioMs / 1000).toFixed(2)}s`;
        document.getElementById('perf-mux').textContent = `${(result.perf.muxMs / 1000).toFixed(2)}s`;
        document.getElementById('perf-fps').textContent = `${result.perf.framesPerSecond.toFixed(1)} fps`;
        document.getElementById('perf-size').textContent = `${(result.blob.size / 1024).toFixed(1)} KB`;

        // Play the video
        const videoUrl = URL.createObjectURL(result.blob);
        const video = document.getElementById('output-video');
        video.src = videoUrl;
        resultDiv.classList.add('visible');

        downloadBtn.disabled = false;
      } catch (err) {
        addLog(`\n❌ Error: ${err.message}`);
        console.error(err);
      } finally {
        renderBtn.disabled = false;
      }
    });

    downloadBtn.addEventListener('click', () => {
      if (!resultBlob) return;
      const url = URL.createObjectURL(resultBlob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'hyperframes-output.mp4';
      a.click();
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
